<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <script>
            class Student {
                constructor() {
                    console.log("생성자 호출!!!");
                }
            }

            const s1 = new Student();
            const s2 = new Student();
            console.log(typeof s1);
            console.log(s1 === s2);

            const s3 = {};
            const s4 = {};
            console.log(typeof s3);
            console.log(s3 === s4);

            s1.name = "김준일";
            console.log(s1.name);
            s1.name = "김준이";
            console.log(s1.name);
            s3.name = "김준삼";
            console.log(s3.name);
            s2["name"] = "김준사";
            console.log(s2.name);
            console.log(s2["name"]);

            const key = "name";
            console.log(s1[key]);
            const datas = {
                names: ["김준일", "김준이"],
                ages: [33, 34],
                a: () => {
                    console.log(datas.names);
                    console.log(datas.ages);
                }
            }

            console.log(datas["names"][0]);
            datas.a();

            const datas2 = datas;   // 얕은 복사
            console.log(datas === datas2);

            const datas3 = {...datas};  // 깊은 복사
            console.log(datas === datas3);
        </script>
    </body>
</html>
