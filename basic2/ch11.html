<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            .chk-group {
                display: flex;
                align-items: center;
            }
            .chk-group > input[type="checkbox"] + label {
                display: flex;
                justify-content: center;
                align-items: center;
                box-sizing: border-box;
                border: 1px solid #dbdbdb;
                border-radius: 50%;
                width: 25px;
                height: 25px;
            }

            .chk-group > input[type="checkbox"]:checked + label::after {
                content: "✨";
                display: block;
                margin-bottom: 5px;
                box-sizing: border-box;
                border-radius: 50%;
                width: 20px;
                height: 20px;
                text-align: center;
                /* background-color: #bbb; */
            }

            .chk-group > input[type="checkbox"] {
                display: none;
            }
        </style>
    </head>
    <body>
        <div class="chk-group">
            <input id="chk1" type="checkbox">
            <label for="chk1"></label>
            <label for="chk1">개발자1</label>
        </div>
        <div class="chk-group">
            <input id="chk2" type="checkbox">
            <label for="chk2"></label>
            <label for="chk2">개발자2</label>
        </div>
    </body>
</html>
