<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            body {
                margin: 0;
                /* height: 100vh; */
                background: #61c2e8;
                background: linear-gradient(130deg, rgba(97, 194, 232, 1) 0%, rgba(87, 199, 133, 1) 50%, rgba(237, 221, 83, 1) 100%);
                /* background-image: url("./images/bg.jpg"); */
                background-repeat: no-repeat;
                background-position: center;
                background-size: cover;
                background-attachment: fixed;
            }

            .container {
                overflow: hidden;
                margin: 10px auto;
                box-sizing: border-box;
                width: 1200px;
                height: 1300px;
                background-color: #fafafa;
            }

            .profile-image {
                margin: 50px auto;
                box-sizing: border-box;
                border: 1px solid #dbdbdb;
                width: 100px;
                height: 100px;
                box-shadow: 0 0 10px 5px #00000044;
                background-image: url("./images/default_profile.jpg");
                background-position: center;
                background-size: cover;
                background-repeat: no-repeat;
                border-radius: 50%;
            }
            .invisible {
                color: white;
            }

        </style>
    </head>
    <body>
        <div class="container">
            <div class="profile-image"></div>
        </div>
        
    </body>
</html>
