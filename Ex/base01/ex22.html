<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            .ul {
                list-style: none;
                padding: 0;
                margin: 0;
                background-color: #333;
            }

            .li {
                display: inline-block;
            }

            .a {
                display: block;
                color: white;
                padding: 14px 20px;
                text-decoration: none;
            }

            .a:hover {
                background-color: blue;
            }
        </style>
    </head>
    <body>
        <ul class="ul">
            <li class="li">
                <a href="" class="a">aaaa</a>
            </li>
        </ul>
    </body>
</html>
