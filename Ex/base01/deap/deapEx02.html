<!DOCTYPE html>
    <html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            nav {
                background-color: #333;
                color: white;
            }
            .menu > li {
                display: inline-block;
                position: relative;
                background-color: aqua;
            }
            .submenu {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                background-color: white;
                border: 1px solid #ddd;
                min-width: 150px;
                z-index: 10;
            }
            .menu>li:hover {
                .submenu {
                    display: block;
                }
            }
        </style>
    </head>
    <body>
        <nav>
            <ul class="menu">
                <li>
                <a href="#">메뉴1</a>
                    <ul class="submenu">
                        <li><a href="#">하위1-1</a></li>
                        <li><a href="#">하위1-2</a></li>
                        <li><a href="#">하위1-3</a></li>
                    </ul>
                </li>
                <li>
                <a href="#">메뉴2</a>
                    <ul class="submenu">
                        <li><a href="#">하위2-1</a></li>
                        <li><a href="#">하위2-2</a></li>
                    </ul>
                </li>
                <li><a href="#">메뉴3</a></li>
            </ul>
        </nav>
    </body>
</html>
