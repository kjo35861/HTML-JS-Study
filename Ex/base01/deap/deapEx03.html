<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
            <!-- 모달 오버레이 (평소에는 display:none) -->
    <div class="modal-overlay" id="modal">
        <div class="modal-box">
            <h2>알림</h2>
            <p>정말 삭제하시겠습니까?</p>
            <button onclick="document.getElementById('modal').style.display='none'">취소</button>
            <button onclick="alert('삭제 완료!')">확인</button>
        </div>
    </div>

    <!-- 트리거 버튼 -->
    <button onclick="document.getElementById('modal').style.display='flex'">삭제하기</button>
    </body>
</html>
