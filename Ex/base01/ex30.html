<!DOCTYPE html>
    <html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            body {
                height: 100vh;
                margin: 0;
                background-color: #f0f0f0;
            }
            .login-box {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 400px;
                padding: 40px;
                background-color: white;
                border: 1px solid #ddd;
                border-radius: 12px;
            }
            input {
                width: 100%;
                padding: 12px;
                margin-bottom: 15px;
                box-sizing: border-box;
            }
            input[type=checkbox] {
                width: 3%;
            }
            button {
                width: 100%;
                padding: 14px;
                background-color: #065a82;
                color: white;
                border: none;
                border-radius: 8px;
                font-size: 16px;
                cursor: pointer;
            }
            .remember {
                color: gray;
            }
        </style>
    </head>
    <body>
        <form action="" class="login-box">
            <div>
                <label for="">아이디</label>
                <input type="text" placeholder="아이디">
            </div>
            <div>
                <label for="">비밀번호</label>
                <input type="password" placeholder="비밀번호">
            </div>
            <div>
                <label for="remember" class="remember">아이디 기억하기</label>
                <input type="checkbox" id="remember">
            </div>
            <div>
                <button>로그인</button>
            </div>
            <div>
                <p>계정이 없으신가요? <a href="">회원가입</a></p>
            </div>
        </form>
    </body>
</html>
