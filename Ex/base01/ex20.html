<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            .parent {
                position: relative;
                width: 400px;
                height: 300px;
                border: 2px solid black;
            }

            .child {
                position: absolute;
                right: 10px;
                bottom: 10px;
            }

            /*부모에 position:relative가 없으면
                child 박스가 웹 자체의 가장 오른쪽 아래로 이동함
                position: absolute 는 절대적인 위치이기에 기준이 사라지면 html 자체를 기준으로 잡음
                고로 html 자체에서 오른쪽에서10px 아래에서10px 위치로 이동*/
        </style>
    </head>
    <body>
        <div class="parent"></div>
            <div class="child">여기!</div>
        </div>
    </body>
</html>
